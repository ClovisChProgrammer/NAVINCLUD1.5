<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>NAVINCLUD - Teste de Visao</title>
  <link rel="stylesheet" href="popup.css">
  <style>
    body { width: 400px; height: 580px; text-align: center; background: #fff; overflow-y: auto; }
    .test-card { display: none; padding: 20px; flex-direction: column; align-items: center; }
    .test-card.active { display: flex; }
    .plate-img { width: 250px; height: 250px; border-radius: 50%; border: 4px solid #333; margin-bottom: 20px; }
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
    .option-btn { padding: 12px; font-weight: bold; cursor: pointer; border: 2px solid #333; background: #fff; border-radius: 8px; }
    .option-btn:hover { background: #f0f0f0; }
    #progress-bar { height: 8px; background: #eee; width: 100%; border-bottom: 1px solid #ddd; }
    #progress-fill { height: 100%; background: #0072b2; width: 0%; transition: width 0.3s; }
    .wizard-btn { padding: 12px 24px; background: #0072b2; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    .wizard-btn:hover { background: #005a8c; }
    #timer { font-size: 24px; font-weight: bold; color: #28a745; margin: 10px 0; }
    #timer.warning { color: #ff6600; }
    #timer.critical { color: #ff0000; }
    .timer-info { background: #e8f5e9; border-left: 4px solid #28a745; padding: 12px; margin: 12px 0; text-align: left; font-size: 13px; line-height: 1.5; border-radius: 4px; }
    .timer-info .legend { display: flex; gap: 12px; margin-top: 8px; font-weight: bold; }
    .timer-info .legend span { padding: 2px 8px; border-radius: 4px; color: white; }
    .timer-info .legend .t-green { background: #28a745; }
    .timer-info .legend .t-orange { background: #ff6600; }
    .timer-info .legend .t-red { background: #dc3545; }
  </style>
</head>
<body>
  <div id="progress-bar"><div id="progress-fill"></div></div>

  <!-- Tela 1: Quiz (18 placas) -->
  <div id="quiz-container" class="test-card active">
    <div id="timer">0s</div>
    <img id="plate-display" class="plate-img" src="">
    <div class="timer-info">
      <strong>Sobre o teste:</strong><br>
      Cada uma das 18 placas tem um tempo máximo de <strong>15 segundos</strong> para responder. Após 15 segundos, a placa muda automaticamente.
      <div class="legend">
        <span class="t-green">0 a 5s: Boa reação</span>
        <span class="t-orange">6 a 10s: Pouca dificuldade</span>
        <span class="t-red">11 a 15s: Dificuldade</span>
      </div>
    </div>
    <p>Que número você identifica na imagem?</p>
    <div id="options-container" class="options-grid"></div>
  </div>

  <!-- Tela 2: Resultado -->
  <div id="results-screen" class="test-card">
    <h2 class="app-title">RESULTADO</h2>
    <div id="result-text" style="margin: 30px 0; font-size: 18px; line-height: 1.5;"></div>
    <button id="apply-wizard" class="wizard-btn" style="display:none;">APLICAR FILTRO</button>
    <button id="negativo-close-btn" class="wizard-btn" style="display:none;">FECHAR</button>
    <button id="recalibrate-btn" class="wizard-btn" style="margin-top:10px; display:none; background:#d55e00;">🎨 RECALIBRAR MONITOR</button>
    <button id="retake-test-btn" class="wizard-btn" style="margin-top:10px; display:none;">🔄 REFAZER TESTE</button>
  </div>

  <div style="text-align:center; margin-top:15px; padding:8px 0; border-top:1px solid #eee;">
    <a href="https://www.buymeacoffee.com/clovisch" target="_blank" rel="noopener" style="display:inline-block; background:#FFDD00; color:#000; text-decoration:none; padding:8px 16px; border-radius:8px; font-size:14px; font-weight:bold;">☕ Buy me a coffee</a>
  </div>
  <script src="wizard.js"></script>
</body>
</html>
