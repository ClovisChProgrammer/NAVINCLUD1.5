<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>NAVINCLUD</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="drag-handle" style="cursor: move; -webkit-app-region: drag;">
      <h2 class="app-title"><img src="icon16.png" alt="" style="width:16px;height:16px;vertical-align:middle;margin-right:4px;"> NAVINCLUD v1.5</h2>
      <p class="app-tagline">Acessibilidade Cromática</p>
    </header>

    <div style="text-align:center; margin-bottom: 12px;">
      <button id="openCalibrate" class="wizard-btn" style="margin-bottom: 8px;">🎨 CALIBRAR MONITOR</button>
      <button id="openWizard" class="wizard-btn">⚡ INICIAR TESTE</button>
    </div>

    <div class="control-group">
      <label>Tipo de Filtro</label>
      <select id="daltonismType">
        <option value="none">Sem filtro</option>
        <option value="protanopia">Protanopia</option>
        <option value="protanomaly">Protanomalia</option>
        <option value="deuteranopia">Deuteranopia</option>
        <option value="deuteranomaly">Deuteranomalia</option>
        <option value="tritanopia">Tritanopia</option>
        <option value="tritanomaly">Tritanomalia</option>
        <option value="achromatopsia">Acromatopsia</option>
      </select>
    </div>

    <div class="control-group">
      <label>Intensidade <span id="intensityValue" class="slider-value">100%</span></label>
      <input type="range" id="intensitySlider" min="0" max="150" value="100">
    </div>

    <div class="control-group">
      <label>Ajuste de Shift <span id="shiftValue" class="slider-value">0.50</span></label>
      <input type="range" id="shiftSlider" min="0" max="100" value="50">
    </div>

    <label class="toggle-row">
      <span class="toggle-text"><span class="toggle-title">Filtro Ativado</span></span>
      <span class="toggle-switch">
        <input type="checkbox" id="toggleFilter">
        <span class="toggle-slider"></span>
      </span>
    </label>

    <div style="text-align:center; font-size:10px; margin-top:12px; padding-top:10px; border-top:1px solid #eee; color:#999;">
      <a href="https://clovischprogrammer.github.io/Navinclud1.5/privacy" target="_blank" rel="noopener" style="color:#999; text-decoration:none;">Política de Privacidade</a>
      <span style="margin:0 6px;">|</span>
      <a href="https://www.buymeacoffee.com/clovisch" target="_blank" rel="noopener" style="color:#999; text-decoration:none;">☕ Buy me a coffee</a>
    </div>
  <script src="popup.js"></script>
</body>
</html>
