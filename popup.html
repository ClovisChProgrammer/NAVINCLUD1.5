<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>NAVINCLUD</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="drag-handle" style="cursor: move; -webkit-app-region: drag;">
      <h2 class="app-title">NAVINCLUD</h2>
      <p class="app-tagline">Acessibilidade Cromática</p>
    </header>

    <div style="text-align:center; margin-bottom: 12px;">
      <button id="openCalibrate" class="wizard-btn" style="margin-bottom: 8px;">🎨 CALIBRAR MONITOR</button>
      <button id="openWizard" class="wizard-btn">⚡ INICIAR TESTE</button>
    </div>

    <div class="control-group">
      <label>Tipo de Filtro</label>
      <select id="daltonismType">
        <option value="none">Sem filtro</option>
        <option value="protanopia">Protanopia</option>
        <option value="protanomaly">Protanomalia</option>
        <option value="deuteranopia">Deuteranopia</option>
        <option value="deuteranomaly">Deuteranomalia</option>
        <option value="tritanopia">Tritanopia</option>
        <option value="tritanomaly">Tritanomalia</option>
        <option value="achromatopsia">Acromatopsia</option>
        <option value="custom">Personalizado</option>
      </select>
    </div>

    <div class="control-group">
      <label>Intensidade <span id="intensityValue" class="slider-value">100%</span></label>
      <input type="range" id="intensitySlider" min="0" max="150" value="100">
    </div>

    <div class="control-group">
      <label>Ajuste de Shift <span id="shiftValue" class="slider-value">0.50</span></label>
      <input type="range" id="shiftSlider" min="0" max="100" value="50">
    </div>

    <label class="toggle-row">
      <span class="toggle-text"><span class="toggle-title">Filtro Ativado</span></span>
      <span class="toggle-switch">
        <input type="checkbox" id="toggleFilter">
        <span class="toggle-slider"></span>
      </span>
    </label>

    <div style="text-align:center; margin-top: 20px; border-top: 1px solid #ddd; padding-top: 15px;">
      <div id="test-counter" style="margin-bottom:10px; font-size:13px; font-weight:bold; color:#333;">
        Testes realizados: <span id="testCountDisplay">0</span>
      </div>

      <button id="exportStart" class="wizard-btn" style="width:100%;">📥 EXPORTAR TODOS OS TESTES</button>

      <div id="exportConfirm1" style="display:none;">
        <p style="font-weight:bold;color:#d55e00;text-align:center;font-size:11px;">ATENÇÃO: VOCÊ CONFIRMA A EXTRAÇÃO DOS TESTES?</p>
        <div style="display:flex; gap:4%;">
          <button id="exportYes" class="wizard-btn" style="width:48%;">SIM</button>
          <button id="exportNo" class="wizard-btn" style="width:48%;background:#666;">NÃO</button>
        </div>
      </div>

      <div id="exportConfirm2" style="display:none;">
        <p style="text-align:center;font-size:11px;margin:8px 0;">Digite <strong>CONFIRMO</strong> para prosseguir:</p>
        <input type="text" id="confirmInput" style="width:100%;padding:4px;border:2px solid #000;border-radius:4px;box-sizing:border-box;">
        <div style="display:flex; gap:4%; margin-top:8px;">
          <button id="confirmBtn" class="wizard-btn" style="width:48%;">CONFIRMO</button>
          <button id="cancelBtn" class="wizard-btn" style="width:48%;background:#666;">CANCELAR</button>
        </div>
      </div>

      <div id="exportNameInput" style="display:none;">
        <p style="text-align:center;font-size:11px;margin:8px 0;">Informe seu nome:</p>
        <input type="text" id="userNameInput" style="width:100%;padding:4px;border:2px solid #000;border-radius:4px;box-sizing:border-box;">
        <div style="display:flex; gap:4%; margin-top:8px;">
          <button id="proceedExportBtn" class="wizard-btn" style="width:48%;">EXPORTAR</button>
          <button id="cancelExportBtn" class="wizard-btn" style="width:48%;background:#666;">CANCELAR</button>
        </div>
      </div>

      <div id="exportResult" style="display:none;">
        <p id="exportResultMsg" style="text-align:center;font-size:11px;"></p>
        <p style="text-align:center;font-size:11px;font-weight:bold;margin:8px 0;">Zerar o contador de testes?</p>
        <div style="display:flex; gap:4%;">
          <button id="zeroYesBtn" class="wizard-btn" style="width:48%;">SIM</button>
          <button id="zeroNoBtn" class="wizard-btn" style="width:48%;background:#666;">NÃO</button>
        </div>
      </div>
    </div>

    <div id="test-active-section" style="display:none; margin-top: 12px; border-top: 1px solid #ddd; padding-top: 12px;">
      <div style="text-align: center; margin-bottom: 8px;">
        <span style="font-weight: bold; color: #0072b2;">Em Teste: </span>
        <span id="timer-display" style="font-size: 18px; font-weight: bold;">02:00</span>
      </div>
      <button id="exitTestBtn" class="wizard-btn" style="width: 100%; margin-top: 8px; background: #dc3545;">SAIR DO TESTE</button>
    </div>
    <div style="text-align:center; font-size:10px; margin-top:12px; padding-top:10px; border-top:1px solid #eee; color:#999;">
      <a href="https://clovischprogrammer.github.io/Navinclud2026TCC/privacy" target="_blank" rel="noopener" style="color:#999; text-decoration:none;">Política de Privacidade</a>
      <span style="margin:0 6px;">|</span>
      <a href="https://www.buymeacoffee.com/clovisch" target="_blank" rel="noopener" style="color:#999; text-decoration:none;">☕ Buy me a coffee</a>
    </div>
  <script src="popup.js"></script>
</body>
</html>
